name: attendance

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  attendance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Run daily attendance
        run: uv run --frozen skland-attendance
        env:
          SKLAND_TOKENS: ${{ secrets.SKLAND_TOKENS }}
          SKLAND_MAX_RETRIES: ${{ vars.SKLAND_MAX_RETRIES }}
          SKLAND_ANONYMOUS: ${{ vars.SKLAND_ANONYMOUS }}

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
